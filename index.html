<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>shinsoku - 南極ペンギンランナー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  }
  canvas { display: block; max-width: 100vw; max-height: 100vh; }
</style>

<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// 定数
// ============================================================
const CANVAS_W = 800;
const CANVAS_H = 400;
const GROUND_Y = 340;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const BASE_SPEED = 5;
const MAX_SPEED = 16;
const SPEED_INCREMENT = 0.001;
const ACCEL_BOOST = 3;
const ACCEL_DURATION = 120;
const SCORE_MULTIPLIER_BOOST = 2;

const PLAYER_W = 32;
const PLAYER_H = 38;
const PLAYER_X = 80;

const OBSTACLE_MIN_W = 22;
const OBSTACLE_MAX_W = 45;
const OBSTACLE_MIN_H = 30;
const OBSTACLE_MAX_H = 58;
const ACCEL_SIZE = 26;

const SPAWN_INTERVAL_MIN = 40;
const SPAWN_INTERVAL_MAX = 120;

// 空の時間サイクル（フレーム数で1周）
const SKY_CYCLE_LENGTH = 7200; // 2分で1周

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// ============================================================
// ユーティリティ
// ============================================================
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) {
  return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];
}

// ============================================================
// ゲーム状態
// ============================================================
let state = 'title';       // title | modeSelect | playing | gameover
let gameMode = 'adventure'; // adventure | zen | cyber
let score = 0;
let highScore = 0;
let distance = 0;          // ZENモード用（メートル）
let gameSpeed = BASE_SPEED;
let accelTimer = 0;
let scoreMultiplier = 1;
let frameCount = 0;
let spawnTimer = 0;
let safeZoneTimer = 0;
const MIN_REACTION_FRAMES = 30;
let titleAnimFrame = 0;
let selectedMode = 0;      // 0=adventure, 1=zen, 2=cyber

// サイバーモード用
let cyberGrid = 0;        // グリッドスクロール
let dataStreams = [];
let glitchTimer = 0;
let scanLine = 0;

// 背景要素
let snowflakes = [];
let groundMarks = [];
let mountains = [];
let auroraWaves = [];
let windOffset = 0;
let windTarget = 0;
let windCurrent = 0;

// 舞台演出
let skyTime = 0;           // 空の時間（0〜1で1周）
let blizzardParticles = [];

// 背景動物（ZENモード用）
let bgAnimals = [];


// ============================================================
// オーディオシステム
// ============================================================
let audioCtx = null;
let audioStarted = false;
let masterGain = null;
let padGain = null;
let windGain = null;
let crystalTimer = 0;

// ペンタトニック音階（透明感のある音）
const CRYSTAL_NOTES = [
  523.25, 587.33, 659.25, 783.99, 880.00,  // C5, D5, E5, G5, A5
  1046.50, 1174.66, 1318.51,                 // C6, D6, E6
];

function initAudio() {
  if (audioStarted) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);

    // パッド（低い持続音）
    const padOsc = audioCtx.createOscillator();
    const padFilter = audioCtx.createBiquadFilter();
    padGain = audioCtx.createGain();
    padOsc.type = 'sine';
    padOsc.frequency.value = 110;
    padFilter.type = 'lowpass';
    padFilter.frequency.value = 200;
    padFilter.Q.value = 1;
    padGain.gain.value = 0.08;
    padOsc.connect(padFilter);
    padFilter.connect(padGain);
    padGain.connect(masterGain);
    padOsc.start();

    // LFO for pad
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.08;
    lfoGain.gain.value = 15;
    lfo.connect(lfoGain);
    lfoGain.connect(padOsc.frequency);
    lfo.start();

    // 風ノイズ
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const windSource = audioCtx.createBufferSource();
    windSource.buffer = noiseBuffer;
    windSource.loop = true;
    const windFilter = audioCtx.createBiquadFilter();
    windFilter.type = 'bandpass';
    windFilter.frequency.value = 400;
    windFilter.Q.value = 0.5;
    windGain = audioCtx.createGain();
    windGain.gain.value = 0.03;
    windSource.connect(windFilter);
    windFilter.connect(windGain);
    windGain.connect(masterGain);
    windSource.start();

    audioStarted = true;
  } catch (e) { /* Audio not supported */ }
}

function playCrystalPing() {
  if (!audioCtx) return;
  const freq = CRYSTAL_NOTES[Math.floor(Math.random() * CRYSTAL_NOTES.length)];
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'sine';
  osc.frequency.value = freq;

  filter.type = 'highpass';
  filter.frequency.value = 300;

  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 3);

  // ディレイ的なエコー（2回目）
  setTimeout(() => {
    if (!audioCtx) return;
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 1.002; // 微妙にデチューン
    g2.gain.setValueAtTime(0.04, audioCtx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
    osc2.connect(g2);
    g2.connect(masterGain);
    osc2.start(audioCtx.currentTime);
    osc2.stop(audioCtx.currentTime + 2.5);
  }, 300);
}

function playJumpSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.2);
}

function playCollectSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.5);
}

function updateAudio() {
  if (!audioCtx) return;
  // クリスタル音を定期的に鳴らす（2〜5秒間隔）
  crystalTimer--;
  if (crystalTimer <= 0) {
    playCrystalPing();
    crystalTimer = randInt(120, 300); // 2〜5秒
  }
  // 風の強さをスピードに連動
  if (windGain) {
    const targetWind = 0.02 + (gameSpeed / MAX_SPEED) * 0.05;
    windGain.gain.value += (targetWind - windGain.gain.value) * 0.01;
  }
}

// ============================================================
// プレイヤー（ペンギン）
// ============================================================
const player = {
  x: PLAYER_X, y: GROUND_Y - PLAYER_H, w: PLAYER_W, h: PLAYER_H,
  vy: 0, onGround: true, jumpCount: 0, maxJumps: 2, runFrame: 0,
};

function playerJump() {
  if (player.jumpCount < player.maxJumps) {
    player.vy = player.jumpCount === 0 ? JUMP_FORCE : JUMP_FORCE * 0.85;
    player.onGround = false;
    player.jumpCount++;
    playJumpSound();
  }
}

function playerUpdate() {
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y - player.h) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.jumpCount = 0;
  }
  player.runFrame += gameSpeed * 0.15;
}

function drawPenguin(x, y, w, h) {
  const cx = x + w / 2;
  const legSwing = player.onGround ? Math.sin(player.runFrame) * 4 : 0;

  // 足（オレンジ）
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(cx - 8 + legSwing, y + h - 6, 7, 6);
  ctx.fillRect(cx + 1 - legSwing, y + h - 6, 7, 6);

  // 体（黒）
  ctx.fillStyle = '#1c1c30';
  ctx.beginPath();
  ctx.ellipse(cx, y + h * 0.5, w * 0.45, h * 0.48, 0, 0, Math.PI * 2);
  ctx.fill();

  // お腹（白）
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.ellipse(cx + 1, y + h * 0.55, w * 0.28, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // 頭（黒）
  ctx.fillStyle = '#1c1c30';
  ctx.beginPath();
  ctx.arc(cx, y + 12, 11, 0, Math.PI * 2);
  ctx.fill();

  // 目（白丸＋黒瞳）
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + 5, y + 10, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(cx + 6, y + 10, 1.8, 0, Math.PI * 2);
  ctx.fill();

  // くちばし（オレンジ三角）
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(cx + 9, y + 13);
  ctx.lineTo(cx + 16, y + 15);
  ctx.lineTo(cx + 9, y + 17);
  ctx.closePath();
  ctx.fill();

  // 翼
  const wingAngle = player.onGround ? Math.sin(player.runFrame * 1.5) * 0.3 : -0.5;
  ctx.fillStyle = '#2a2a48';
  ctx.save();
  ctx.translate(cx - w * 0.35, y + h * 0.35);
  ctx.rotate(-0.3 + wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, h * 0.17, 4, h * 0.19, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(cx + w * 0.35, y + h * 0.35);
  ctx.rotate(0.3 - wingAngle);
  ctx.beginPath();
  ctx.ellipse(0, h * 0.17, 4, h * 0.19, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function playerDraw() {
  drawPenguin(player.x, player.y, player.w, player.h);

  if (!player.onGround && player.jumpCount < player.maxJumps) {
    const alpha = 0.5 + Math.sin(frameCount * 0.3) * 0.3;
    const iy = player.y + player.h + 6;
    const ix = player.x + player.w / 2;
    ctx.strokeStyle = `rgba(180, 220, 255, ${alpha})`;
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i + frameCount * 0.05;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix + Math.cos(angle) * 6, iy + Math.sin(angle) * 6);
      ctx.stroke();
    }
  }

  if (accelTimer > 0) {
    for (let i = 0; i < 4; i++) {
      const px = player.x - rand(8, 35);
      const py = player.y + rand(0, player.h);
      ctx.fillStyle = `rgba(180, 230, 255, ${rand(0.3, 0.8)})`;
      ctx.fillRect(px, py, rand(2, 5), rand(2, 5));
    }
    ctx.strokeStyle = 'rgba(200, 235, 255, 0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ly = player.y + 5 + i * 12;
      const lx = player.x - rand(10, 25);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - rand(15, 35), ly);
      ctx.stroke();
    }
  }
}

// ============================================================
// オブジェクト管理
// ============================================================
let obstacles = [];
let accelerators = [];

function spawnObstacle() {
  const w = randInt(OBSTACLE_MIN_W, OBSTACLE_MAX_W);
  const h = randInt(OBSTACLE_MIN_H, OBSTACLE_MAX_H);
  const type = Math.random() < 0.5 ? 'iceberg' : 'iceSpike';
  obstacles.push({ x: CANVAS_W + 10, y: GROUND_Y - h, w, h, type });
}

function spawnAccelerator() {
  const yOffset = randInt(0, 60);
  accelerators.push({
    x: CANVAS_W + 10, y: GROUND_Y - ACCEL_SIZE - yOffset,
    w: ACCEL_SIZE, h: ACCEL_SIZE, wobble: rand(0, Math.PI * 2),
  });
}

function spawnObject() {
  if (Math.random() < 0.3) spawnAccelerator();
  else spawnObstacle();
}

function updateObjects() {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= gameSpeed;
    if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
  }
  for (let i = accelerators.length - 1; i >= 0; i--) {
    accelerators[i].x -= gameSpeed;
    if (accelerators[i].x + accelerators[i].w < 0) accelerators.splice(i, 1);
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    if (o.type === 'iceberg') {
      ctx.fillStyle = '#7ec8e3';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = 'rgba(200, 240, 255, 0.5)';
      ctx.fillRect(o.x + 3, o.y + 3, o.w * 0.3, o.h - 6);
      ctx.strokeStyle = 'rgba(100, 180, 220, 0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(o.x + o.w * 0.5, o.y);
      ctx.lineTo(o.x + o.w * 0.4, o.y + o.h * 0.4);
      ctx.lineTo(o.x + o.w * 0.6, o.y + o.h * 0.7);
      ctx.stroke();
      ctx.fillStyle = '#e8f4f8';
      ctx.fillRect(o.x, o.y, o.w, 4);
    } else {
      ctx.fillStyle = '#a8dce8';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w / 2, o.y);
      ctx.lineTo(o.x + o.w, o.y + o.h);
      ctx.lineTo(o.x, o.y + o.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(220, 245, 255, 0.4)';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w / 2, o.y + 4);
      ctx.lineTo(o.x + o.w * 0.65, o.y + o.h);
      ctx.lineTo(o.x + o.w * 0.3, o.y + o.h);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawAccelerators() {
  for (const a of accelerators) {
    const cx = a.x + a.w / 2;
    const cy = a.y + a.h / 2;
    const wobble = Math.sin(frameCount * 0.08 + a.wobble) * 3;
    ctx.save();
    ctx.translate(cx, cy + wobble);
    const glow = 0.7 + Math.sin(frameCount * 0.1 + a.wobble) * 0.3;
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.ellipse(0, 0, a.w * 0.4, a.h * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-a.w * 0.35, 0);
    ctx.lineTo(-a.w * 0.55, -a.h * 0.2);
    ctx.lineTo(-a.w * 0.55, a.h * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(a.w * 0.2, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(a.w * 0.22, -2, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255, 255, 200, ${glow * 0.6})`;
    ctx.fillRect(Math.cos(frameCount * 0.15) * 8 - 1, Math.sin(frameCount * 0.15) * 5 - 1, 3, 3);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============================================================
// 当たり判定
// ============================================================
function checkCollisions() {
  const pRect = { x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 8 };
  if (gameMode === 'adventure' || gameMode === 'cyber') {
    for (const o of obstacles) {
      if (rectsOverlap(pRect, o)) return 'hit';
    }
  }
  for (let i = accelerators.length - 1; i >= 0; i--) {
    if (rectsOverlap(pRect, accelerators[i])) {
      accelerators.splice(i, 1);
      return 'accel';
    }
  }
  return 'none';
}

// ============================================================
// 空の時間サイクル
// ============================================================
// 5つのフェーズ: 極夜→黎明→白夜→黄昏→オーロラの夜
const SKY_PHASES = [
  { name: '極夜',        top: [8, 15, 40],   mid: [12, 25, 55],  bot: [18, 35, 65],  starAlpha: 0.5 },
  { name: '黎明',        top: [15, 25, 55],  mid: [60, 50, 70],  bot: [120, 90, 80], starAlpha: 0.15 },
  { name: '白夜',        top: [100, 140, 180], mid: [160, 190, 210], bot: [200, 220, 235], starAlpha: 0 },
  { name: '黄昏',        top: [25, 25, 60],  mid: [80, 50, 60],  bot: [140, 80, 60], starAlpha: 0.1 },
  { name: 'オーロラの夜', top: [8, 10, 25],   mid: [10, 18, 40],  bot: [15, 28, 50],  starAlpha: 0.4 },
];

function getSkyColors() {
  const totalPhases = SKY_PHASES.length;
  const phaseFloat = skyTime * totalPhases;
  const phaseIndex = Math.floor(phaseFloat) % totalPhases;
  const nextIndex = (phaseIndex + 1) % totalPhases;
  const t = phaseFloat - Math.floor(phaseFloat);
  // smooth step
  const st = t * t * (3 - 2 * t);

  const cur = SKY_PHASES[phaseIndex];
  const nxt = SKY_PHASES[nextIndex];

  return {
    top: lerpColor(cur.top, nxt.top, st),
    mid: lerpColor(cur.mid, nxt.mid, st),
    bot: lerpColor(cur.bot, nxt.bot, st),
    starAlpha: lerp(cur.starAlpha, nxt.starAlpha, st),
    phaseName: cur.name,
  };
}

function getGroundColors(sky) {
  // 空の明るさに応じて地面の色を変える
  const brightness = (sky.bot[0] + sky.bot[1] + sky.bot[2]) / 3;
  const factor = Math.min(1, brightness / 200);
  // 暗い時は青暗い雪、明るい時は白い雪
  return {
    top: [lerp(140, 214, factor), lerp(160, 234, factor), lerp(185, 248, factor)],
    bot: [lerp(100, 168, factor), lerp(130, 200, factor), lerp(165, 224, factor)],
  };
}

// ============================================================
// 背景 — 南極
// ============================================================
function initSnowflakes() {
  snowflakes = [];
  for (let i = 0; i < 40; i++) {
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-20, GROUND_Y),
      size: rand(0.8, 1.5), layer: 0,
      speedX: rand(0.1, 0.4), speedY: rand(0.15, 0.5),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.008, 0.02), swaySpeed2: rand(0.003, 0.008),
      swayAmp1: rand(0.2, 0.6), swayAmp2: rand(0.5, 1.5),
      alpha: rand(0.12, 0.25), sparkle: false,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.005, 0.005),
    });
  }
  for (let i = 0; i < 35; i++) {
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-30, GROUND_Y),
      size: rand(1.5, 3), layer: 1,
      speedX: rand(0.2, 0.7), speedY: rand(0.3, 0.8),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.012, 0.025), swaySpeed2: rand(0.005, 0.012),
      swayAmp1: rand(0.3, 0.8), swayAmp2: rand(0.8, 2.0),
      alpha: rand(0.2, 0.45), sparkle: Math.random() < 0.2,
      crystal: Math.random() < 0.15,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.01, 0.01),
    });
  }
  for (let i = 0; i < 15; i++) {
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-50, GROUND_Y),
      size: rand(3, 6), layer: 2,
      speedX: rand(0.5, 1.2), speedY: rand(0.5, 1.0),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.015, 0.03), swaySpeed2: rand(0.006, 0.015),
      swayAmp1: rand(0.5, 1.2), swayAmp2: rand(1.0, 3.0),
      alpha: rand(0.08, 0.18), sparkle: false, crystal: false,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.015, 0.015),
    });
  }
}

function initMountains() {
  mountains = [];
  // 4層: 遠景ほどなだらかで低い、手前ほど高くディテール多め
  for (let layer = 0; layer < 4; layer++) {
    const points = [];
    const numPoints = 12 + layer * 4;
    const baseH = [55, 45, 30, 18][layer];     // 層ごとの基本高さ
    const variation = [35, 28, 20, 12][layer];  // 高さのブレ幅
    const totalWidth = CANVAS_W + 200;          // ループ用に幅を広めに
    for (let i = 0; i <= numPoints; i++) {
      points.push({
        x: (totalWidth / numPoints) * i,
        h: baseH + rand(-variation, variation),
      });
    }
    mountains.push({ points, layer, offset: 0, totalWidth });
  }
}

function initGroundMarks() {
  groundMarks = [];
  for (let i = 0; i < 25; i++) {
    groundMarks.push({ x: rand(0, CANVAS_W), w: rand(3, 12), speed: rand(0.6, 1) });
  }
}

function initAuroraWaves() {
  auroraWaves = [];
  for (let i = 0; i < 5; i++) {
    auroraWaves.push({
      offset: rand(0, Math.PI * 2), amplitude: rand(15, 40),
      frequency: rand(0.004, 0.012), y: rand(25, 110),
      hue: rand(100, 280), speed: rand(0.004, 0.012),
    });
  }
}

function initBgAnimals() {
  bgAnimals = [];
}

function spawnBgAnimal() {
  const types = ['seal', 'whale', 'penguin_bg'];
  const type = types[Math.floor(Math.random() * types.length)];
  if (type === 'whale') {
    bgAnimals.push({
      type, x: CANVAS_W + 50, y: rand(80, 150),
      speed: rand(0.3, 0.6), frame: 0, alpha: rand(0.08, 0.15),
    });
  } else if (type === 'seal') {
    bgAnimals.push({
      type, x: CANVAS_W + 30, y: GROUND_Y - 8,
      speed: rand(0.8, 1.5), frame: 0, alpha: 0.3,
    });
  } else {
    bgAnimals.push({
      type, x: CANVAS_W + 20, y: GROUND_Y - 18,
      speed: rand(0.5, 1), frame: 0, alpha: 0.25,
    });
  }
}

function updateBackground() {
  // 風
  if (Math.random() < 0.005) windTarget = rand(-1.5, 1.5);
  windCurrent += (windTarget - windCurrent) * 0.01;
  windOffset = windCurrent;

  // 雪
  for (const s of snowflakes) {
    const layerScrollMul = [0.3, 0.7, 1.2][s.layer];
    s.x -= s.speedX * (gameSpeed / BASE_SPEED) * layerScrollMul;
    s.y += s.speedY;
    s.sway1 += s.swaySpeed1;
    s.sway2 += s.swaySpeed2;
    s.x += (Math.sin(s.sway1) * s.swayAmp1 + Math.sin(s.sway2) * s.swayAmp2) * 0.15;
    s.x += windOffset * (0.3 + s.layer * 0.4);
    s.rotation += s.rotSpeed;
    if (s.y > GROUND_Y + 5) { s.y = rand(-30, -5); s.x = rand(-20, CANVAS_W + 20); }
    if (s.x < -30) s.x = CANVAS_W + rand(5, 30);
    if (s.x > CANVAS_W + 30) s.x = rand(-30, -5);
  }

  // 山（遠景ほど遅い）
  for (const m of mountains) m.offset -= gameSpeed * (0.05 + m.layer * 0.08);
  // 地面
  for (const g of groundMarks) {
    g.x -= g.speed * gameSpeed;
    if (g.x < -15) g.x = CANVAS_W + rand(0, 30);
  }

  // 空の時間を進める
  const skySpeed = gameMode === 'zen' ? 1.2 : 0.8;
  skyTime = (skyTime + skySpeed / SKY_CYCLE_LENGTH) % 1;

  // 吹雪（オーロラの夜フェーズ付近で弱い吹雪）
  const phaseFloat = skyTime * SKY_PHASES.length;
  const phaseIndex = Math.floor(phaseFloat) % SKY_PHASES.length;
  const isBlizzardPhase = phaseIndex === 0; // 極夜で軽い吹雪
  if (isBlizzardPhase && blizzardParticles.length < 40) {
    blizzardParticles.push({
      x: CANVAS_W + rand(0, 50), y: rand(0, GROUND_Y),
      size: rand(1, 2.5), speedX: rand(2, 5), speedY: rand(0.3, 1.5),
    });
  }
  for (let i = blizzardParticles.length - 1; i >= 0; i--) {
    blizzardParticles[i].x -= blizzardParticles[i].speedX;
    blizzardParticles[i].y += blizzardParticles[i].speedY;
    if (blizzardParticles[i].x < -10 || blizzardParticles[i].y > GROUND_Y) {
      if (isBlizzardPhase) {
        blizzardParticles[i].x = CANVAS_W + rand(0, 50);
        blizzardParticles[i].y = rand(0, GROUND_Y * 0.5);
      } else {
        blizzardParticles.splice(i, 1);
      }
    }
  }

  // 背景動物（ZENモードのみ）
  if (gameMode === 'zen' && Math.random() < 0.002) spawnBgAnimal();
  for (let i = bgAnimals.length - 1; i >= 0; i--) {
    bgAnimals[i].x -= bgAnimals[i].speed * gameSpeed;
    bgAnimals[i].frame += 0.05;
    if (bgAnimals[i].x < -80) bgAnimals.splice(i, 1);
  }
}

function drawSky() {
  const sky = getSkyColors();
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, `rgb(${sky.top[0]|0},${sky.top[1]|0},${sky.top[2]|0})`);
  grad.addColorStop(0.5, `rgb(${sky.mid[0]|0},${sky.mid[1]|0},${sky.mid[2]|0})`);
  grad.addColorStop(1, `rgb(${sky.bot[0]|0},${sky.bot[1]|0},${sky.bot[2]|0})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

  // 星（暗い時だけ）
  if (sky.starAlpha > 0.02) {
    for (const s of snowflakes) {
      if (s.layer !== 0 || s.y > GROUND_Y - 40) continue;
      const flicker = 0.3 + Math.sin(frameCount * 0.03 + s.sway1 * 5) * 0.2;
      ctx.fillStyle = `rgba(220, 230, 255, ${sky.starAlpha * flicker})`;
      ctx.fillRect(s.x * 1.3 % CANVAS_W, s.y * 0.6, 1.5, 1.5);
    }
  }
}

function drawAurora() {
  const phaseFloat = skyTime * SKY_PHASES.length;
  const phaseIndex = Math.floor(phaseFloat) % SKY_PHASES.length;
  const t = phaseFloat - Math.floor(phaseFloat);
  // オーロラの夜フェーズ（4）と極夜（0）でオーロラ表示
  let auroraIntensity = 0;
  if (phaseIndex === 4) auroraIntensity = 1;
  else if (phaseIndex === 3 && t > 0.7) auroraIntensity = (t - 0.7) / 0.3;
  else if (phaseIndex === 0 && t < 0.3) auroraIntensity = 1 - t / 0.3;
  if (auroraIntensity < 0.01) return;

  for (const wave of auroraWaves) {
    wave.offset += wave.speed;
    ctx.beginPath();
    ctx.moveTo(0, wave.y);
    for (let x = 0; x <= CANVAS_W; x += 3) {
      const y = wave.y + Math.sin(x * wave.frequency + wave.offset + frameCount * 0.008) * wave.amplitude;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(CANVAS_W, wave.y + 45);
    ctx.lineTo(0, wave.y + 45);
    ctx.closePath();
    const hue = (wave.hue + frameCount * 0.15) % 360;
    ctx.fillStyle = `hsla(${hue}, 70%, 60%, ${0.07 * auroraIntensity})`;
    ctx.fill();
  }
}

function drawMountainPath(m) {
  // スムーズな稜線をquadraticCurveToで描画
  const pts = m.points;
  const tw = m.totalWidth;

  ctx.beginPath();
  ctx.moveTo(-10, GROUND_Y);

  // 最初のポイントへ
  const firstX = ((pts[0].x + m.offset) % tw + tw) % tw - 100;
  ctx.lineTo(firstX, GROUND_Y - pts[0].h);

  // スムーズカーブ: 隣接する2点の中点をアンカーにして滑らかに
  for (let i = 0; i < pts.length - 1; i++) {
    const cx = ((pts[i].x + m.offset) % tw + tw) % tw - 100;
    const cy = GROUND_Y - pts[i].h;
    const nx = ((pts[i + 1].x + m.offset) % tw + tw) % tw - 100;
    const ny = GROUND_Y - pts[i + 1].h;
    // 中点をカーブの到達点に、現在点をコントロールポイントに
    const midX = (cx + nx) / 2;
    const midY = (cy + ny) / 2;
    ctx.quadraticCurveTo(cx, cy, midX, midY);
  }

  // 最後のポイント
  const lastIdx = pts.length - 1;
  const lastX = ((pts[lastIdx].x + m.offset) % tw + tw) % tw - 100;
  ctx.lineTo(lastX, GROUND_Y - pts[lastIdx].h);

  ctx.lineTo(CANVAS_W + 10, GROUND_Y);
  ctx.closePath();
}

function getSunInfo() {
  const phaseFloat = skyTime * SKY_PHASES.length;
  const phaseIndex = Math.floor(phaseFloat) % SKY_PHASES.length;
  const t = phaseFloat - Math.floor(phaseFloat);
  let sunAlpha = 0;
  if (phaseIndex === 2) sunAlpha = 0.8;
  else if (phaseIndex === 1 && t > 0.4) sunAlpha = (t - 0.4) * 1.67;
  else if (phaseIndex === 3 && t < 0.6) sunAlpha = (0.6 - t) * 1.67;
  const sunX = CANVAS_W * 0.7;
  const sunY = GROUND_Y - 30 - Math.sin(skyTime * Math.PI * 2) * 40;
  return { x: sunX, y: sunY, alpha: sunAlpha };
}

function drawSunBehind() {
  // 山の裏からにじむ光（山の前に描画）
  const sun = getSunInfo();
  if (sun.alpha < 0.01) return;
  // 広い光芒（空気中の拡散光）
  const glow = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 160);
  glow.addColorStop(0, `rgba(255, 235, 190, ${sun.alpha * 0.25})`);
  glow.addColorStop(0.3, `rgba(255, 215, 160, ${sun.alpha * 0.1})`);
  glow.addColorStop(0.7, `rgba(255, 200, 150, ${sun.alpha * 0.03})`);
  glow.addColorStop(1, 'rgba(255, 200, 150, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sun.x - 160, sun.y - 160, 320, 320);
}

function drawSunFront() {
  // 山の手前に描く太陽のにじみ（山を透かして見える効果）
  const sun = getSunInfo();
  if (sun.alpha < 0.01) return;
  // 太陽本体（柔らかいグロー）
  const core = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 30);
  core.addColorStop(0, `rgba(255, 245, 220, ${sun.alpha * 0.7})`);
  core.addColorStop(0.3, `rgba(255, 235, 200, ${sun.alpha * 0.35})`);
  core.addColorStop(0.7, `rgba(255, 220, 180, ${sun.alpha * 0.08})`);
  core.addColorStop(1, 'rgba(255, 220, 180, 0)');
  ctx.fillStyle = core;
  ctx.fillRect(sun.x - 30, sun.y - 30, 60, 60);
  // 地平線の暖色ライン
  const horizonGlow = ctx.createLinearGradient(sun.x - 200, 0, sun.x + 200, 0);
  horizonGlow.addColorStop(0, 'rgba(255, 200, 140, 0)');
  horizonGlow.addColorStop(0.5, `rgba(255, 210, 160, ${sun.alpha * 0.1})`);
  horizonGlow.addColorStop(1, 'rgba(255, 200, 140, 0)');
  ctx.fillStyle = horizonGlow;
  ctx.fillRect(sun.x - 200, GROUND_Y - 8, 400, 8);
}

function drawMountains() {
  const sky = getSkyColors();
  const brightness = (sky.bot[0] + sky.bot[1] + sky.bot[2]) / 3;

  for (let mi = 0; mi < mountains.length; mi++) {
    const m = mountains[mi];

    // 奥の層は半透明で空が透ける、手前は濃い
    const opacity = [0.4, 0.55, 0.75, 0.9][mi];
    const depthFade = [0.15, 0.25, 0.4, 0.6][mi];
    const baseBright = brightness * depthFade;
    const r = Math.max(12, baseBright * 0.5 + 15) | 0;
    const g = Math.max(15, baseBright * 0.55 + 20) | 0;
    const b = Math.max(22, baseBright * 0.7 + 30) | 0;

    ctx.globalAlpha = opacity;
    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
    drawMountainPath(m);
    ctx.fill();

    // 山頂の雪ハイライト
    const snowAlpha = (0.06 + mi * 0.03 + brightness / 500) * depthFade;
    const snowGrad = ctx.createLinearGradient(0, GROUND_Y - 90, 0, GROUND_Y - 15);
    snowGrad.addColorStop(0, `rgba(230, 240, 255, ${snowAlpha})`);
    snowGrad.addColorStop(1, 'rgba(230, 240, 255, 0)');
    ctx.fillStyle = snowGrad;
    drawMountainPath(m);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawBgAnimals() {
  for (const a of bgAnimals) {
    ctx.globalAlpha = a.alpha;
    if (a.type === 'whale') {
      // 遠くのクジラの影
      ctx.fillStyle = '#1a2a4a';
      ctx.beginPath();
      ctx.ellipse(a.x, a.y, 35, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      // 尾
      const tailY = Math.sin(a.frame) * 3;
      ctx.beginPath();
      ctx.moveTo(a.x - 35, a.y);
      ctx.lineTo(a.x - 50, a.y - 12 + tailY);
      ctx.lineTo(a.x - 50, a.y + 8 + tailY);
      ctx.closePath();
      ctx.fill();
      // 潮吹き（たまに）
      if (Math.sin(a.frame * 0.5) > 0.8) {
        ctx.fillStyle = `rgba(200, 230, 255, ${a.alpha * 0.5})`;
        ctx.beginPath();
        ctx.moveTo(a.x + 20, a.y - 8);
        ctx.lineTo(a.x + 18, a.y - 20);
        ctx.lineTo(a.x + 25, a.y - 18);
        ctx.lineTo(a.x + 22, a.y - 8);
        ctx.fill();
      }
    } else if (a.type === 'seal') {
      // アザラシ（地面で寝てる）
      ctx.fillStyle = '#4a5a6a';
      ctx.beginPath();
      ctx.ellipse(a.x, a.y, 15, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(a.x + 12, a.y - 3, 5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 背景ペンギン（小さい）
      ctx.fillStyle = '#1a1a3a';
      ctx.beginPath();
      ctx.ellipse(a.x, a.y, 5, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.ellipse(a.x, a.y + 2, 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawGround() {
  const sky = getSkyColors();
  const gc = getGroundColors(sky);
  const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
  groundGrad.addColorStop(0, `rgb(${gc.top[0]|0},${gc.top[1]|0},${gc.top[2]|0})`);
  groundGrad.addColorStop(1, `rgb(${gc.bot[0]|0},${gc.bot[1]|0},${gc.bot[2]|0})`);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  for (const g of groundMarks) {
    const alpha = 0.2 + Math.sin(frameCount * 0.03 + g.x) * 0.15;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(g.x, GROUND_Y + 4, g.w, 2);
  }
  ctx.strokeStyle = `rgba(200, 220, 240, 0.4)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();
}

function drawSnowCrystal(x, y, size, rotation, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.strokeStyle = `rgba(210, 235, 255, ${alpha})`;
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i;
    const ex = Math.cos(angle) * size;
    const ey = Math.sin(angle) * size;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke();
    if (size > 2.5) {
      const bLen = size * 0.35;
      const bx = ex * 0.65, by = ey * 0.65;
      ctx.beginPath();
      ctx.moveTo(bx + Math.cos(angle + 0.5) * bLen, by + Math.sin(angle + 0.5) * bLen);
      ctx.lineTo(bx, by);
      ctx.lineTo(bx + Math.cos(angle - 0.5) * bLen, by + Math.sin(angle - 0.5) * bLen);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawSnowflakes() {
  for (let layer = 0; layer <= 2; layer++) {
    for (const s of snowflakes) {
      if (s.layer !== layer) continue;
      let alpha = s.alpha + Math.sin(frameCount * 0.02 + s.sway1 * 10) * 0.08;
      if (s.sparkle) {
        const sparkPhase = Math.sin(frameCount * 0.05 + s.sway2 * 20);
        if (sparkPhase > 0.92) {
          alpha = Math.min(0.9, alpha + 0.5);
          ctx.strokeStyle = `rgba(255, 255, 240, ${alpha * 0.4})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(s.x - s.size * 2, s.y); ctx.lineTo(s.x + s.size * 2, s.y);
          ctx.moveTo(s.x, s.y - s.size * 2); ctx.lineTo(s.x, s.y + s.size * 2);
          ctx.stroke();
        }
      }
      if (s.crystal) {
        drawSnowCrystal(s.x, s.y, s.size * 1.8, s.rotation, alpha);
      } else if (layer === 2) {
        const gradient = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
        gradient.addColorStop(0, `rgba(220, 240, 255, ${alpha})`);
        gradient.addColorStop(0.5, `rgba(220, 240, 255, ${alpha * 0.4})`);
        gradient.addColorStop(1, 'rgba(220, 240, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(s.x - s.size, s.y - s.size, s.size * 2, s.size * 2);
      } else {
        ctx.fillStyle = `rgba(225, 238, 255, ${alpha})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
}

function drawBlizzard() {
  if (blizzardParticles.length === 0) return;
  ctx.fillStyle = 'rgba(220, 235, 255, 0.08)';
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);
  for (const p of blizzardParticles) {
    ctx.fillStyle = `rgba(240, 248, 255, ${rand(0.3, 0.7)})`;
    ctx.fillRect(p.x, p.y, p.size, p.size * 0.5);
  }
}

// バイナリ中心、たまにhexや文字
function randMatrixChar() {
  const r = Math.random();
  if (r < 0.75) return Math.random() < 0.5 ? '0' : '1';
  if (r < 0.9) return '0123456789ABCDEF'[randInt(0, 15)];
  return 'ABCDEFGHIJKLMNOPQRSTUVWXYZ<>/\\{}[]()'[randInt(0, 35)];
}

// 回路トレース/ノード/スパークル
let circuitTraces = [];
let circuitNodes = [];
let hexagons = [];
let motionDashes = [];

function initDataStreams() {
  dataStreams = [];
  for (let i = 0; i < 18; i++) {
    dataStreams.push({
      x: rand(0, CANVAS_W), speed: rand(1, 4),
      chars: Array.from({ length: randInt(6, 18) }, randMatrixChar),
      offset: rand(0, 300), alpha: rand(0.05, 0.2),
    });
  }
}

function initCircuit() {
  circuitTraces = [];
  circuitNodes = [];
  // L字型の回路トレース（コーナーで90度曲がる配線）
  for (let i = 0; i < 20; i++) {
    const startX = rand(0, CANVAS_W * 1.5);
    const startY = rand(30, GROUND_Y - 30);
    const segments = randInt(2, 5);
    const path = [{ x: startX, y: startY }];
    let cur = { x: startX, y: startY };
    let lastDir = null;
    for (let s = 0; s < segments; s++) {
      // 90度のみ（縦または横）
      const dirs = lastDir === 'h' ? ['v'] : lastDir === 'v' ? ['h'] : ['h', 'v'];
      const dir = dirs[randInt(0, dirs.length - 1)];
      const len = rand(20, 80);
      const sign = Math.random() < 0.5 ? 1 : -1;
      if (dir === 'h') cur = { x: cur.x + len * sign, y: cur.y };
      else cur = { x: cur.x, y: cur.y + len * sign };
      path.push({ ...cur });
      lastDir = dir;
    }
    circuitTraces.push({
      path, alpha: rand(0.15, 0.35), speed: rand(0.3, 0.8),
      pulsePhase: rand(0, Math.PI * 2),
    });
    // 末端にノード（ジャンクション点）を置く
    circuitNodes.push({
      x: cur.x, y: cur.y, speed: circuitTraces[circuitTraces.length - 1].speed,
      sparklePhase: rand(0, Math.PI * 2), sparkleInterval: rand(0.5, 2),
      size: rand(1.5, 3),
    });
  }
}

function initHexagons() {
  hexagons = [];
  for (let i = 0; i < 6; i++) {
    hexagons.push({
      x: rand(0, CANVAS_W * 1.5), y: rand(50, GROUND_Y - 60),
      size: rand(25, 60), speed: rand(0.4, 1),
      alpha: rand(0.08, 0.2), rotation: rand(0, Math.PI / 3),
    });
  }
}

function initMotionDashes() {
  motionDashes = [];
  for (let i = 0; i < 40; i++) {
    motionDashes.push({
      x: rand(0, CANVAS_W * 0.5),
      y: rand(20, GROUND_Y - 10),
      w: rand(8, 30),
      speed: rand(3, 9),
      alpha: rand(0.1, 0.35),
    });
  }
}

function drawCyberBackground() {
  // 真っ黒な空間
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // データストリーム（マトリックス風の縦文字列）
  ctx.font = '12px monospace';
  for (const ds of dataStreams) {
    ds.offset += ds.speed * 0.3;
    for (let j = 0; j < ds.chars.length; j++) {
      const cy = ((ds.offset + j * 18) % (GROUND_Y + 40)) - 20;
      const isHead = j === Math.floor(ds.offset / 18) % ds.chars.length;
      ctx.fillStyle = isHead ? `rgba(0, 255, 200, ${ds.alpha * 2.5})` : `rgba(0, 200, 160, ${ds.alpha})`;
      ctx.textAlign = 'left';
      ctx.fillText(ds.chars[j], ds.x, cy);
    }
    // 文字をたまに変更
    if (Math.random() < 0.04) {
      ds.chars[randInt(0, ds.chars.length - 1)] = randMatrixChar();
    }
  }

  // 六角形（背景、ゆっくりスクロール）
  for (const hx of hexagons) {
    hx.x -= hx.speed * (gameSpeed / BASE_SPEED);
    if (hx.x + hx.size < -20) {
      hx.x = CANVAS_W + rand(50, 200);
      hx.y = rand(50, GROUND_Y - 60);
      hx.size = rand(25, 60);
      hx.alpha = rand(0.08, 0.2);
    }
    ctx.save();
    ctx.translate(hx.x, hx.y);
    ctx.rotate(hx.rotation);
    ctx.strokeStyle = `rgba(180, 80, 255, ${hx.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
      const a = (Math.PI / 3) * k;
      const px = Math.cos(a) * hx.size;
      const py = Math.sin(a) * hx.size;
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    // 内側の小六角
    ctx.strokeStyle = `rgba(180, 80, 255, ${hx.alpha * 0.5})`;
    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
      const a = (Math.PI / 3) * k;
      const px = Math.cos(a) * hx.size * 0.55;
      const py = Math.sin(a) * hx.size * 0.55;
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // 回路トレース（L字の配線）
  for (const tr of circuitTraces) {
    // スクロール
    for (const p of tr.path) p.x -= tr.speed * (gameSpeed / BASE_SPEED);
    const rightMost = tr.path[tr.path.length - 1].x;
    if (rightMost < -50) {
      const shift = CANVAS_W + 100 - rightMost + rand(0, 200);
      for (const p of tr.path) p.x += shift;
    }
    // パルス効果
    tr.pulsePhase += 0.03;
    const pulse = 0.7 + Math.sin(tr.pulsePhase) * 0.3;
    ctx.strokeStyle = `rgba(0, 220, 255, ${tr.alpha * pulse})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < tr.path.length; i++) {
      if (i === 0) ctx.moveTo(tr.path[i].x, tr.path[i].y);
      else ctx.lineTo(tr.path[i].x, tr.path[i].y);
    }
    ctx.stroke();
    // コーナーに小さなジャンクションドット
    for (let i = 1; i < tr.path.length - 1; i++) {
      ctx.fillStyle = `rgba(0, 255, 200, ${tr.alpha * 1.5 * pulse})`;
      ctx.fillRect(tr.path[i].x - 1, tr.path[i].y - 1, 2, 2);
    }
  }

  // 回路ノード（スパークル）
  for (const n of circuitNodes) {
    n.x -= n.speed * (gameSpeed / BASE_SPEED);
    if (n.x < -30) n.x = CANVAS_W + rand(50, 300);
    n.sparklePhase += 0.05;
    const bright = Math.sin(n.sparklePhase * n.sparkleInterval);
    if (bright > 0.3) {
      const glow = (bright - 0.3) / 0.7;
      ctx.fillStyle = `rgba(255, 255, 255, ${glow * 0.9})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
      ctx.fill();
      // 十字光芒
      ctx.strokeStyle = `rgba(200, 150, 255, ${glow * 0.6})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(n.x - n.size * 3, n.y); ctx.lineTo(n.x + n.size * 3, n.y);
      ctx.moveTo(n.x, n.y - n.size * 3); ctx.lineTo(n.x, n.y + n.size * 3);
      ctx.stroke();
      // 外側のリング
      ctx.strokeStyle = `rgba(255, 180, 255, ${glow * 0.3})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * 2, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // モーションダッシュ（左側のスピードライン）
  for (const md of motionDashes) {
    md.x -= md.speed * (gameSpeed / BASE_SPEED);
    if (md.x + md.w < 0) {
      md.x = CANVAS_W * 0.5 + rand(0, CANVAS_W * 0.3);
      md.y = rand(20, GROUND_Y - 10);
      md.w = rand(8, 30);
      md.speed = rand(3, 9);
      md.alpha = rand(0.1, 0.35);
    }
    // 左端にいくほど濃く
    const edgeFactor = 1 - Math.min(1, md.x / (CANVAS_W * 0.4));
    ctx.fillStyle = `rgba(200, 100, 255, ${md.alpha * (0.3 + edgeFactor * 0.7)})`;
    ctx.fillRect(md.x, md.y, md.w, 1.5);
  }

  // 左端のドットマトリックス
  ctx.fillStyle = 'rgba(180, 80, 255, 0.25)';
  for (let dy = 40; dy < GROUND_Y - 10; dy += 8) {
    for (let dx = 2; dx < 18; dx += 5) {
      if (Math.sin(dy * 0.1 + frameCount * 0.02 + dx) > 0) {
        ctx.fillRect(dx, dy, 1.5, 1.5);
      }
    }
  }

  // パースペクティブグリッド（地面）
  cyberGrid += gameSpeed * 0.5;
  const gridSpacing = 40;
  const gridOffset = cyberGrid % gridSpacing;

  // 地面ベース
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  // 横線（奥行き感）
  for (let i = 0; i < 8; i++) {
    const gy = GROUND_Y + 4 + i * 8;
    const alpha = 0.15 - i * 0.015;
    ctx.strokeStyle = `rgba(0, 220, 255, ${Math.max(0.02, alpha)})`;
    ctx.lineWidth = i === 0 ? 1.5 : 0.5;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(CANVAS_W, gy);
    ctx.stroke();
  }

  // 縦線（スクロール）
  ctx.strokeStyle = 'rgba(0, 180, 255, 0.1)';
  ctx.lineWidth = 0.5;
  for (let x = -gridOffset; x < CANVAS_W; x += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, CANVAS_H);
    ctx.stroke();
  }

  // 地平線のグロー
  const horizGlow = ctx.createLinearGradient(0, GROUND_Y - 15, 0, GROUND_Y + 5);
  horizGlow.addColorStop(0, 'rgba(0, 200, 255, 0)');
  horizGlow.addColorStop(0.5, 'rgba(0, 200, 255, 0.08)');
  horizGlow.addColorStop(1, 'rgba(0, 200, 255, 0)');
  ctx.fillStyle = horizGlow;
  ctx.fillRect(0, GROUND_Y - 15, CANVAS_W, 20);

  // スキャンライン
  scanLine = (scanLine + 1.5) % CANVAS_H;
  ctx.fillStyle = 'rgba(0, 255, 200, 0.03)';
  ctx.fillRect(0, scanLine, CANVAS_W, 2);

  // オシロスコープ波形（サイン波）
  ctx.strokeStyle = `rgba(0, 255, 200, 0.18)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  const sineY = 90;
  for (let x = 0; x <= CANVAS_W; x += 2) {
    const y = sineY + Math.sin((x + frameCount * 3) * 0.04) * 25;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 矩形波（下の方）
  ctx.strokeStyle = `rgba(255, 0, 200, 0.15)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  const sqY = 160;
  const sqPeriod = 60;
  const sqOffset = frameCount * 2;
  for (let x = 0; x <= CANVAS_W + sqPeriod; x += 1) {
    const phase = ((x + sqOffset) % sqPeriod) / sqPeriod;
    const y = sqY + (phase < 0.5 ? -12 : 12);
    if (x === 0) ctx.moveTo(0, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // のこぎり波（上の方、細く）
  ctx.strokeStyle = `rgba(100, 200, 255, 0.12)`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  const sawY = 220;
  const sawPeriod = 80;
  const sawOffset = frameCount * 1.5;
  for (let x = 0; x <= CANVAS_W + sawPeriod; x += 1) {
    const phase = ((x + sawOffset) % sawPeriod) / sawPeriod;
    const y = sawY + (phase * 20 - 10);
    if (x === 0) ctx.moveTo(0, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // FFT風の縦棒（画面右端）
  const fftBars = 24;
  const fftW = 3;
  for (let i = 0; i < fftBars; i++) {
    const seed = i * 0.7 + frameCount * 0.08;
    const h = (Math.sin(seed) * 0.5 + 0.5) * 20 + Math.sin(seed * 2.3) * 8 + 4;
    const alpha = 0.1 + Math.abs(Math.sin(seed)) * 0.1;
    ctx.fillStyle = `rgba(0, 255, 150, ${alpha})`;
    ctx.fillRect(CANVAS_W - fftBars * (fftW + 1) + i * (fftW + 1), 280 - h, fftW, h);
  }

  // ランダムグリッチ
  if (glitchTimer > 0) {
    glitchTimer--;
    const gy = rand(0, CANVAS_H - 20);
    const gh = rand(2, 8);
    ctx.fillStyle = `rgba(255, 0, 100, ${rand(0.08, 0.22)})`;
    ctx.fillRect(0, gy, CANVAS_W, gh);
    ctx.fillStyle = `rgba(0, 255, 200, ${rand(0.05, 0.12)})`;
    ctx.fillRect(rand(-5, 5), gy + rand(-2, 2), CANVAS_W, 1);
    // 画面シフト風
    if (Math.random() < 0.3) {
      ctx.fillStyle = `rgba(150, 0, 255, 0.1)`;
      ctx.fillRect(0, gy - 3, CANVAS_W, 1);
    }
  } else if (Math.random() < 0.008) {
    glitchTimer = randInt(3, 14);
  }

  // ランダムなバイナリテキスト（背景に薄く）
  if (frameCount % 3 === 0) {
    ctx.font = '10px monospace';
    ctx.fillStyle = 'rgba(0, 180, 140, 0.12)';
    ctx.textAlign = 'left';
    const bx = rand(0, CANVAS_W - 80);
    const by = rand(40, GROUND_Y - 20);
    let bs = '';
    for (let i = 0; i < 8; i++) bs += Math.random() < 0.5 ? '0' : '1';
    ctx.fillText(bs, bx, by);
  }

  // 加速中エフェクト
  if (accelTimer > 0) {
    ctx.fillStyle = `rgba(255, 0, 200, 0.04)`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

function drawCyberObstacles() {
  for (const o of obstacles) {
    // ファイアウォール（ネオン矩形）
    ctx.strokeStyle = `rgba(255, 0, 80, ${0.7 + Math.sin(frameCount * 0.1) * 0.3})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    // 内側のグロー
    ctx.fillStyle = 'rgba(255, 0, 60, 0.08)';
    ctx.fillRect(o.x, o.y, o.w, o.h);
    // 横線パターン
    ctx.strokeStyle = 'rgba(255, 0, 80, 0.15)';
    ctx.lineWidth = 0.5;
    for (let sy = o.y + 4; sy < o.y + o.h; sy += 6) {
      ctx.beginPath();
      ctx.moveTo(o.x, sy);
      ctx.lineTo(o.x + o.w, sy);
      ctx.stroke();
    }
    // 警告アイコン
    ctx.fillStyle = `rgba(255, 60, 80, ${0.5 + Math.sin(frameCount * 0.15) * 0.3})`;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ERR', o.x + o.w / 2, o.y - 4);
  }
}

function drawCyberAccelerators() {
  for (const a of accelerators) {
    const cx = a.x + a.w / 2;
    const cy = a.y + a.h / 2;
    const pulse = Math.sin(frameCount * 0.12 + a.wobble) * 0.3 + 0.7;
    // データパケット（回転する菱形）
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(frameCount * 0.03);
    ctx.strokeStyle = `rgba(0, 255, 200, ${pulse})`;
    ctx.lineWidth = 1.5;
    const s = a.w * 0.35;
    ctx.beginPath();
    ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = `rgba(0, 255, 200, ${pulse * 0.15})`;
    ctx.fill();
    // 内側の小さい菱形
    ctx.strokeStyle = `rgba(0, 255, 255, ${pulse * 0.5})`;
    ctx.lineWidth = 1;
    const s2 = s * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -s2); ctx.lineTo(s2, 0); ctx.lineTo(0, s2); ctx.lineTo(-s2, 0);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function drawCyberPlayer() {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const glowPhase = 0.6 + Math.sin(frameCount * 0.1) * 0.3;

  // 記号的な自機：三角（頭）＋逆三角（胴）のアバター
  //      △
  //     ┃┃    ← 走行時の脚
  //      ▽
  const headColor = `rgba(0, 255, 255, ${glowPhase})`;
  const bodyColor = `rgba(0, 200, 255, ${glowPhase * 0.9})`;
  const accentColor = `rgba(255, 0, 200, ${glowPhase})`;

  // 外周のグロー（ワイヤーフレーム）
  ctx.save();
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 8;

  // 胴（逆三角形 ▽）
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - player.w * 0.35, cy - 2);
  ctx.lineTo(cx + player.w * 0.35, cy - 2);
  ctx.lineTo(cx, cy + player.h * 0.35);
  ctx.closePath();
  ctx.fillStyle = `rgba(0, 80, 120, ${glowPhase * 0.3})`;
  ctx.fill();
  ctx.stroke();

  // 頭（三角形 △）
  ctx.strokeStyle = headColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, player.y + 2);
  ctx.lineTo(cx - player.w * 0.3, cy - 4);
  ctx.lineTo(cx + player.w * 0.3, cy - 4);
  ctx.closePath();
  ctx.fillStyle = `rgba(0, 100, 140, ${glowPhase * 0.3})`;
  ctx.fill();
  ctx.stroke();

  // 目（シングルピクセル発光）
  ctx.shadowBlur = 4;
  ctx.fillStyle = accentColor;
  ctx.fillRect(cx + 3, player.y + 11, 3, 3);

  // くちばし／方向表示（右向きの小三角）
  ctx.fillStyle = accentColor;
  ctx.beginPath();
  ctx.moveTo(cx + player.w * 0.3, cy - 6);
  ctx.lineTo(cx + player.w * 0.45, cy - 4);
  ctx.lineTo(cx + player.w * 0.3, cy - 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // 脚（走行時の縦バー）
  if (player.onGround) {
    const legPhase = Math.sin(player.runFrame) > 0;
    ctx.fillStyle = `rgba(0, 255, 200, ${glowPhase * 0.8})`;
    ctx.fillRect(cx - 6, cy + player.h * 0.35, 2, 6 + (legPhase ? 2 : 0));
    ctx.fillRect(cx + 4, cy + player.h * 0.35, 2, 6 + (legPhase ? 0 : 2));
  } else {
    // ジャンプ中はトレイル
    ctx.fillStyle = `rgba(0, 255, 255, ${glowPhase * 0.4})`;
    ctx.fillRect(cx - 8, cy + player.h * 0.35, 16, 1);
  }

  // 二段ジャンプインジケーター（サイバー版：下向き矢印）
  if (!player.onGround && player.jumpCount < player.maxJumps) {
    const alpha = 0.5 + Math.sin(frameCount * 0.3) * 0.3;
    ctx.strokeStyle = `rgba(255, 0, 200, ${alpha})`;
    ctx.lineWidth = 1.5;
    const ix = cx, iy = player.y + player.h + 8;
    ctx.beginPath();
    ctx.moveTo(ix - 5, iy); ctx.lineTo(ix, iy + 4); ctx.lineTo(ix + 5, iy);
    ctx.stroke();
  }

  // 加速中：データトレイル
  if (accelTimer > 0) {
    for (let i = 0; i < 4; i++) {
      const px = player.x - i * 10 - rand(0, 5);
      const py = cy + rand(-player.h * 0.3, player.h * 0.3);
      ctx.fillStyle = `rgba(255, 0, 200, ${rand(0.3, 0.6) * (1 - i * 0.2)})`;
      ctx.fillRect(px, py, rand(8, 20), 1);
    }
  }
}

function drawCyberUI() {
  // UIバー
  ctx.fillStyle = 'rgba(0, 10, 20, 0.6)';
  ctx.fillRect(0, 0, CANVAS_W, 55);
  ctx.strokeStyle = 'rgba(0, 200, 255, 0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 55); ctx.lineTo(CANVAS_W, 55); ctx.stroke();

  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#0f0';
  ctx.fillText(`SCORE:${Math.floor(score).toString().padStart(8, '0')}`, CANVAS_W - 15, 24);
  ctx.fillStyle = '#0a8';
  ctx.fillText(`HI:${Math.floor(highScore).toString().padStart(8, '0')}`, CANVAS_W - 15, 44);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#0cf';
  ctx.fillText(`SPD:${gameSpeed.toFixed(1)}`, 15, 24);
  ctx.fillStyle = '#08a';
  ctx.font = '11px monospace';
  ctx.fillText('MODE:CYBER', 15, 44);

  if (accelTimer > 0) {
    ctx.fillStyle = '#f0a';
    ctx.font = '13px monospace';
    ctx.fillText(`>>BOOST x${scoreMultiplier}`, 140, 44);
    ctx.fillStyle = 'rgba(40,40,40,0.5)';
    ctx.fillRect(140, 48, 70, 3);
    ctx.fillStyle = '#f0a';
    ctx.fillRect(140, 48, 70 * (accelTimer / ACCEL_DURATION), 3);
  }
}

function drawBackground() {
  if (gameMode === 'cyber') {
    drawCyberBackground();
    return;
  }
  drawSky();
  drawAurora();
  drawSunBehind();
  drawMountains();
  drawSunFront();
  drawBgAnimals();
  drawGround();
  drawSnowflakes();
  drawBlizzard();
  if (accelTimer > 0) {
    ctx.fillStyle = 'rgba(200, 230, 255, 0.04)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

// ============================================================
// UI描画
// ============================================================
function drawUI() {
  ctx.fillStyle = 'rgba(10, 20, 40, 0.25)';
  ctx.fillRect(0, 0, CANVAS_W, 60);

  const sky = getSkyColors();
  ctx.font = '16px "Segoe UI", sans-serif';

  if (gameMode === 'adventure') {
    ctx.fillStyle = '#e0f0ff';
    ctx.textAlign = 'right';
    ctx.fillText(`SCORE: ${Math.floor(score)}`, CANVAS_W - 20, 28);
    ctx.fillStyle = '#8ab8d8';
    ctx.fillText(`HI: ${Math.floor(highScore)}`, CANVAS_W - 20, 48);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#e0f0ff';
    ctx.fillText(`SPEED: ${gameSpeed.toFixed(1)}`, 20, 28);
  } else {
    // ZENモードUI
    ctx.fillStyle = '#c0ddf0';
    ctx.textAlign = 'right';
    const km = (distance / 1000).toFixed(1);
    ctx.fillText(`${km} km`, CANVAS_W - 20, 28);
    ctx.fillStyle = '#7ab8d8';
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillText('ZEN MODE', CANVAS_W - 20, 48);
    ctx.textAlign = 'left';

  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillStyle = `rgba(180, 210, 240, 0.6)`;

  ctx.fillText(sky.phaseName, 20, 48);

  if (accelTimer > 0) {
    ctx.fillStyle = '#f39c12';
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText(`BOOST x${scoreMultiplier}`, 120, 48);
    ctx.fillStyle = 'rgba(50,50,50,0.5)';
    ctx.fillRect(120, 54, 70, 4);
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(120, 54, 70 * (accelTimer / ACCEL_DURATION), 4);
  }
}

// ============================================================
// タイトル・モード選択
// ============================================================
function drawTitle() {
  titleAnimFrame++;
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0, '#0b1a3b');
  grad.addColorStop(0.5, '#132850');
  grad.addColorStop(0.7, '#1e3a5f');
  grad.addColorStop(0.85, '#d6eaf8');
  grad.addColorStop(1, '#a8c8e0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    for (let x = 0; x <= CANVAS_W; x += 4) {
      const y = 50 + i * 18 + Math.sin(x * 0.008 + titleAnimFrame * 0.008 + i) * 25;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.lineTo(CANVAS_W, 110);
    ctx.lineTo(0, 110);
    ctx.closePath();
    ctx.fillStyle = `hsla(${(120 + i * 60 + titleAnimFrame * 0.2) % 360}, 60%, 55%, 0.05)`;
    ctx.fill();
  }

  drawPenguin(CANVAS_W / 2 - 16, 178, 32, 38);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 44px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SHINSOKU', CANVAS_W / 2, 145);
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillStyle = '#8ab8d8';
  ctx.fillText('- 南極ペンギンランナー -', CANVAS_W / 2, 168);

  if (state === 'title') {
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.fillStyle = '#c0ddf0';
    ctx.fillText('スペースキー or タップ でモード選択へ', CANVAS_W / 2, 245);

    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillStyle = '#80b8d8';
    ctx.fillText('二段ジャンプ可能！  空中でもう一度押せる', CANVAS_W / 2, 285);
    ctx.fillStyle = '#7ec8e3';
    ctx.fillText('氷の障害物をジャンプで避けよう', CANVAS_W / 2, 308);
    ctx.fillStyle = '#f39c12';
    ctx.fillText('魚を取るとスピードUP！', CANVAS_W / 2, 331);

    if (highScore > 0) {
      ctx.fillStyle = '#c0ddf0';
      ctx.fillText(`ハイスコア: ${Math.floor(highScore)}`, CANVAS_W / 2, 370);
    }
  }
}

function drawModeSelect() {
  drawTitle();

  // モード選択UI
  ctx.fillStyle = 'rgba(5, 15, 35, 0.7)';
  ctx.fillRect(0, 228, CANVAS_W, 170);

  const modes = [
    { label: 'ADVENTURE', desc: '障害物を避けてスコアを稼ぐ', color: '#4fc3f7' },
    { label: 'ZEN', desc: '南極の風景を楽しむ散歩モード', color: '#80cbc4' },
    { label: 'CYBER', desc: 'サイバー空間を駆け抜ける', color: '#e040fb' },
  ];

  for (let i = 0; i < modes.length; i++) {
    const y = 258 + i * 42;
    const isSelected = selectedMode === i;
    const mc = modes[i].color;

    if (isSelected) {
      ctx.fillStyle = `${mc}18`;
      ctx.fillRect(CANVAS_W / 2 - 180, y - 16, 360, 36);
      ctx.strokeStyle = `${mc}80`;
      ctx.lineWidth = 1;
      ctx.strokeRect(CANVAS_W / 2 - 180, y - 16, 360, 36);
    }

    ctx.textAlign = 'center';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillStyle = isSelected ? mc : '#5a7a95';
    ctx.fillText(modes[i].label, CANVAS_W / 2, y + 4);

    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.fillStyle = isSelected ? '#9ab8d0' : '#3a5a70';
    ctx.fillText(modes[i].desc, CANVAS_W / 2, y + 18);
  }

  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillStyle = '#5a7a95';
  ctx.textAlign = 'center';
  ctx.fillText('↑↓ で選択　スペース/タップ で決定', CANVAS_W / 2, 392);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(5, 15, 35, 0.7)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = '#7ec8e3';
  ctx.font = 'bold 40px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CANVAS_W / 2, 145);

  ctx.save();
  ctx.translate(CANVAS_W / 2, 195);
  ctx.rotate(0.3);
  drawPenguin(-16, -19, 32, 38);
  ctx.restore();

  ctx.fillStyle = '#e0f0ff';
  ctx.font = '22px "Segoe UI", sans-serif';
  ctx.fillText(`SCORE: ${Math.floor(score)}`, CANVAS_W / 2, 250);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#f39c12';
    ctx.font = '18px "Segoe UI", sans-serif';
    ctx.fillText('NEW RECORD!', CANVAS_W / 2, 282);
  }

  ctx.fillStyle = '#8ab8d8';
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillText('スペースキー or タップ でリトライ', CANVAS_W / 2, 325);
}

// ============================================================
// ゲーム制御
// ============================================================
function resetGame() {
  player.y = GROUND_Y - PLAYER_H;
  player.vy = 0;
  player.onGround = true;
  player.jumpCount = 0;
  player.runFrame = 0;
  obstacles = [];
  accelerators = [];
  accelTimer = 0;
  scoreMultiplier = 1;
  score = 0;
  distance = 0;
  frameCount = 0;
  safeZoneTimer = 0;
  skyTime = 0;
  blizzardParticles = [];
  bgAnimals = [];
  windOffset = 0; windTarget = 0; windCurrent = 0;
  crystalTimer = randInt(60, 180);

  if (gameMode === 'zen') {
    gameSpeed = 3.5;
  } else if (gameMode === 'cyber') {
    gameSpeed = 6;  // やや速め
  } else {
    gameSpeed = BASE_SPEED;
  }
  spawnTimer = randInt(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_MAX);
  initSnowflakes();
  initMountains();
  initGroundMarks();
  initAuroraWaves();
  initBgAnimals();
  initDataStreams();
  initCircuit();
  initHexagons();
  initMotionDashes();
  cyberGrid = 0; glitchTimer = 0; scanLine = 0;
}

function update() {
  if (state !== 'playing') {
    titleAnimFrame++;
    return;
  }

  frameCount++;
  playerUpdate();
  updateObjects();
  updateBackground();
  updateAudio();

  if (gameMode === 'adventure' || gameMode === 'cyber') {
    const baseSpd = gameMode === 'cyber' ? 6 : BASE_SPEED;
    const increment = gameMode === 'cyber' ? 0.0015 : SPEED_INCREMENT;
    if (gameSpeed < MAX_SPEED) gameSpeed += increment;

    if (accelTimer > 0) {
      accelTimer--;
      if (accelTimer <= 0) {
        gameSpeed = Math.max(baseSpd, gameSpeed - ACCEL_BOOST);
        scoreMultiplier = 1;
      }
    }

    if (safeZoneTimer > 0) safeZoneTimer--;

    spawnTimer--;
    if (spawnTimer <= 0) {
      if (safeZoneTimer > 0) {
        if (Math.random() < 0.4) spawnAccelerator();
      } else {
        spawnObject();
      }
      const reactionGap = MIN_REACTION_FRAMES + Math.floor(gameSpeed * 1.5);
      spawnTimer = randInt(reactionGap, reactionGap + randInt(20, 50));
    }

    const result = checkCollisions();
    if (result === 'hit') {
      state = 'gameover';
      if (score > highScore) highScore = score;
      return;
    }
    if (result === 'accel') {
      gameSpeed = Math.min(MAX_SPEED, gameSpeed + ACCEL_BOOST);
      accelTimer = ACCEL_DURATION;
      scoreMultiplier = SCORE_MULTIPLIER_BOOST;
      safeZoneTimer = 90;
      playCollectSound();
    }
    score += 0.1 * (gameSpeed / baseSpd) * scoreMultiplier;

  } else {
    // ZENモード
    // 速度はゆるやかに揺らぐ（一定ではなく波のように）
    gameSpeed = 3.5 + Math.sin(frameCount * 0.002) * 0.5;
    distance += gameSpeed * 0.5;

    // たまに魚が出る（取っても何も起きないけど音が鳴る）
    spawnTimer--;
    if (spawnTimer <= 0) {
      if (Math.random() < 0.2) spawnAccelerator();
      spawnTimer = randInt(200, 500);
    }

    // 魚を取った時の判定
    const result = checkCollisions();
    if (result === 'accel') {
      playCollectSound();
    }
  }
}

function draw() {
  if (state === 'title') { drawTitle(); return; }
  if (state === 'modeSelect') { drawModeSelect(); return; }
  drawBackground();
  if (gameMode === 'cyber') {
    drawCyberObstacles();
    drawCyberAccelerators();
    drawCyberPlayer();
    drawCyberUI();
  } else {
    if (gameMode === 'adventure') drawObstacles();
    drawAccelerators();
    playerDraw();
    drawUI();
  }
  if (state === 'gameover') drawGameOver();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// 入力
// ============================================================
function handleAction() {
  initAudio(); // 最初のユーザー操作でオーディオ開始
  if (state === 'title') {
    state = 'modeSelect';
  } else if (state === 'modeSelect') {
    gameMode = ['adventure', 'zen', 'cyber'][selectedMode];
    resetGame();
    state = 'playing';
  } else if (state === 'playing') {
    playerJump();
  } else if (state === 'gameover') {
    state = 'modeSelect';
  }
}

function handleModeSwitch(dir) {
  if (state === 'modeSelect') {
    selectedMode = (selectedMode + dir + 3) % 3;
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); handleAction(); }
  else if (e.code === 'ArrowUp') { e.preventDefault(); handleModeSwitch(-1); if (state === 'playing') playerJump(); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); handleModeSwitch(1); }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  // タッチの上半分/下半分でモード選択を切り替え
  if (state === 'modeSelect') {
    const rect = canvas.getBoundingClientRect();
    const y = (e.touches[0].clientY - rect.top) / rect.height;
    selectedMode = y > 0.75 ? 2 : y > 0.55 ? 1 : 0;
  }
  handleAction();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (state === 'modeSelect') {
    const rect = canvas.getBoundingClientRect();
    const y = (e.clientY - rect.top) / rect.height;
    selectedMode = y > 0.75 ? 2 : y > 0.55 ? 1 : 0;
  }
  handleAction();
});

// ============================================================
// 起動
// ============================================================
initSnowflakes();
initMountains();
initGroundMarks();
initAuroraWaves();
initBgAnimals();
gameLoop();
</script>
</body>
</html>
