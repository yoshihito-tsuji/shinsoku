<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>shinsoku - 南極ペンギンランナー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// 定数
// ============================================================
const CANVAS_W = 800;
const CANVAS_H = 400;
const GROUND_Y = 340;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const BASE_SPEED = 5;
const MAX_SPEED = 16;
const SPEED_INCREMENT = 0.001;
const ACCEL_BOOST = 3;
const ACCEL_DURATION = 120;
const SCORE_MULTIPLIER_BOOST = 2;

const PLAYER_W = 32;
const PLAYER_H = 38;
const PLAYER_X = 80;

const OBSTACLE_MIN_W = 22;
const OBSTACLE_MAX_W = 45;
const OBSTACLE_MIN_H = 30;
const OBSTACLE_MAX_H = 58;

const ACCEL_SIZE = 26;

const SPAWN_INTERVAL_MIN = 40;
const SPAWN_INTERVAL_MAX = 120;

// ============================================================
// Canvas セットアップ
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// ============================================================
// ユーティリティ
// ============================================================
function rand(min, max) {
  return Math.random() * (max - min) + min;
}
function randInt(min, max) {
  return Math.floor(rand(min, max + 1));
}
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// ゲーム状態
// ============================================================
let state = 'title';
let score = 0;
let highScore = 0;
let gameSpeed = BASE_SPEED;
let accelTimer = 0;
let scoreMultiplier = 1;
let frameCount = 0;
let spawnTimer = 0;
let safeZoneTimer = 0;
const MIN_REACTION_FRAMES = 30;

// 背景要素
let snowflakes = [];    // 3層の雪
let groundMarks = [];
let mountains = [];
let auroraWaves = [];
let windOffset = 0;     // 全体の風の揺らぎ
let windTarget = 0;
let windCurrent = 0;

// 舞台演出
let stageMode = 'clear';  // clear | blizzard | aurora
let stageTimer = 0;
let blizzardParticles = [];

// ============================================================
// プレイヤー（ペンギン）
// ============================================================
const player = {
  x: PLAYER_X,
  y: GROUND_Y - PLAYER_H,
  w: PLAYER_W,
  h: PLAYER_H,
  vy: 0,
  onGround: true,
  jumpCount: 0,
  maxJumps: 2,
  runFrame: 0,
};

function playerJump() {
  if (player.jumpCount < player.maxJumps) {
    player.vy = player.jumpCount === 0 ? JUMP_FORCE : JUMP_FORCE * 0.85;
    player.onGround = false;
    player.jumpCount++;
  }
}

function playerUpdate() {
  player.vy += GRAVITY;
  player.y += player.vy;
  if (player.y >= GROUND_Y - player.h) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.jumpCount = 0;
  }
  player.runFrame += gameSpeed * 0.15;
}

function drawPenguin(x, y, w, h) {
  const cx = x + w / 2;
  const legSwing = player.onGround ? Math.sin(player.runFrame) * 4 : 0;

  // 足（オレンジ）
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(cx - 8 + legSwing, y + h - 6, 7, 6);
  ctx.fillRect(cx + 1 - legSwing, y + h - 6, 7, 6);

  // 体（黒）
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(cx, y + h * 0.5, w * 0.45, h * 0.48, 0, 0, Math.PI * 2);
  ctx.fill();

  // お腹（白）
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.ellipse(cx + 1, y + h * 0.55, w * 0.28, h * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // 頭（黒）
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(cx, y + 12, 12, 0, Math.PI * 2);
  ctx.fill();

  // 目（白丸＋黒瞳）
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + 5, y + 10, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(cx + 6, y + 10, 2, 0, Math.PI * 2);
  ctx.fill();

  // くちばし（オレンジ三角）
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(cx + 10, y + 13);
  ctx.lineTo(cx + 18, y + 15);
  ctx.lineTo(cx + 10, y + 17);
  ctx.closePath();
  ctx.fill();

  // 翼（走りモーション）
  const wingAngle = player.onGround ? Math.sin(player.runFrame * 1.5) * 0.3 : -0.5;
  ctx.fillStyle = '#2c2c4a';
  // 左翼
  ctx.save();
  ctx.translate(cx - w * 0.35, y + h * 0.35);
  ctx.rotate(-0.3 + wingAngle);
  ctx.fillRect(-3, 0, 6, h * 0.35);
  ctx.restore();
  // 右翼
  ctx.save();
  ctx.translate(cx + w * 0.35, y + h * 0.35);
  ctx.rotate(0.3 - wingAngle);
  ctx.fillRect(-3, 0, 6, h * 0.35);
  ctx.restore();
}

function playerDraw() {
  drawPenguin(player.x, player.y, player.w, player.h);

  // 二段ジャンプインジケーター（雪の結晶風）
  if (!player.onGround && player.jumpCount < player.maxJumps) {
    const alpha = 0.5 + Math.sin(frameCount * 0.3) * 0.3;
    const iy = player.y + player.h + 6;
    const ix = player.x + player.w / 2;
    ctx.strokeStyle = `rgba(180, 220, 255, ${alpha})`;
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i + frameCount * 0.05;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix + Math.cos(angle) * 6, iy + Math.sin(angle) * 6);
      ctx.stroke();
    }
  }

  // 加速中エフェクト（氷の粒子）
  if (accelTimer > 0) {
    for (let i = 0; i < 4; i++) {
      const px = player.x - rand(8, 35);
      const py = player.y + rand(0, player.h);
      const size = rand(2, 5);
      ctx.fillStyle = `rgba(180, 230, 255, ${rand(0.3, 0.8)})`;
      ctx.fillRect(px, py, size, size);
    }
    // スピードライン
    ctx.strokeStyle = `rgba(200, 235, 255, 0.4)`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ly = player.y + 5 + i * 12;
      const lx = player.x - rand(10, 25);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - rand(15, 35), ly);
      ctx.stroke();
    }
  }
}

// ============================================================
// オブジェクト管理
// ============================================================
let obstacles = [];
let accelerators = [];

function spawnObstacle() {
  const w = randInt(OBSTACLE_MIN_W, OBSTACLE_MAX_W);
  const h = randInt(OBSTACLE_MIN_H, OBSTACLE_MAX_H);
  const type = Math.random() < 0.5 ? 'iceberg' : 'iceSpike';
  obstacles.push({ x: CANVAS_W + 10, y: GROUND_Y - h, w, h, type });
}

function spawnAccelerator() {
  const yOffset = randInt(0, 60);
  accelerators.push({
    x: CANVAS_W + 10,
    y: GROUND_Y - ACCEL_SIZE - yOffset,
    w: ACCEL_SIZE,
    h: ACCEL_SIZE,
    wobble: rand(0, Math.PI * 2),
  });
}

function spawnObject() {
  if (Math.random() < 0.3) {
    spawnAccelerator();
  } else {
    spawnObstacle();
  }
}

function updateObjects() {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= gameSpeed;
    if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
  }
  for (let i = accelerators.length - 1; i >= 0; i--) {
    accelerators[i].x -= gameSpeed;
    if (accelerators[i].x + accelerators[i].w < 0) accelerators.splice(i, 1);
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    if (o.type === 'iceberg') {
      // 氷塊（角張った半透明ブルー）
      ctx.fillStyle = '#7ec8e3';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // ハイライト
      ctx.fillStyle = 'rgba(200, 240, 255, 0.5)';
      ctx.fillRect(o.x + 3, o.y + 3, o.w * 0.3, o.h - 6);
      // クラック線
      ctx.strokeStyle = 'rgba(100, 180, 220, 0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(o.x + o.w * 0.5, o.y);
      ctx.lineTo(o.x + o.w * 0.4, o.y + o.h * 0.4);
      ctx.lineTo(o.x + o.w * 0.6, o.y + o.h * 0.7);
      ctx.stroke();
      // 上部の雪
      ctx.fillStyle = '#e8f4f8';
      ctx.fillRect(o.x, o.y, o.w, 4);
    } else {
      // 氷のトゲ（三角形）
      ctx.fillStyle = '#a8dce8';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w / 2, o.y);
      ctx.lineTo(o.x + o.w, o.y + o.h);
      ctx.lineTo(o.x, o.y + o.h);
      ctx.closePath();
      ctx.fill();
      // ハイライト
      ctx.fillStyle = 'rgba(220, 245, 255, 0.4)';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w / 2, o.y + 4);
      ctx.lineTo(o.x + o.w * 0.65, o.y + o.h);
      ctx.lineTo(o.x + o.w * 0.3, o.y + o.h);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawAccelerators() {
  for (const a of accelerators) {
    // 魚アイテム
    const cx = a.x + a.w / 2;
    const cy = a.y + a.h / 2;
    const wobble = Math.sin(frameCount * 0.08 + a.wobble) * 3;

    ctx.save();
    ctx.translate(cx, cy + wobble);

    // 魚の体（銀色〜オレンジ）
    const glow = 0.7 + Math.sin(frameCount * 0.1 + a.wobble) * 0.3;
    ctx.globalAlpha = glow;

    // 体（楕円）
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.ellipse(0, 0, a.w * 0.4, a.h * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();

    // 尻尾
    ctx.beginPath();
    ctx.moveTo(-a.w * 0.35, 0);
    ctx.lineTo(-a.w * 0.55, -a.h * 0.2);
    ctx.lineTo(-a.w * 0.55, a.h * 0.2);
    ctx.closePath();
    ctx.fill();

    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(a.w * 0.2, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(a.w * 0.22, -2, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // キラキラ
    ctx.fillStyle = `rgba(255, 255, 200, ${glow * 0.6})`;
    const sparkX = Math.cos(frameCount * 0.15) * 8;
    const sparkY = Math.sin(frameCount * 0.15) * 5;
    ctx.fillRect(sparkX - 1, sparkY - 1, 3, 3);

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============================================================
// 当たり判定
// ============================================================
function checkCollisions() {
  const pRect = { x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 8 };

  for (const o of obstacles) {
    if (rectsOverlap(pRect, o)) return 'hit';
  }
  for (let i = accelerators.length - 1; i >= 0; i--) {
    if (rectsOverlap(pRect, accelerators[i])) {
      accelerators.splice(i, 1);
      return 'accel';
    }
  }
  return 'none';
}

// ============================================================
// 背景 — 南極
// ============================================================
function initSnowflakes() {
  snowflakes = [];
  // Layer 0: 遠景（小さく、ぼんやり、ゆっくり）
  for (let i = 0; i < 40; i++) {
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-20, GROUND_Y),
      size: rand(0.8, 1.5), layer: 0,
      speedX: rand(0.1, 0.4), speedY: rand(0.15, 0.5),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.008, 0.02), swaySpeed2: rand(0.003, 0.008),
      swayAmp1: rand(0.2, 0.6), swayAmp2: rand(0.5, 1.5),
      alpha: rand(0.12, 0.25), sparkle: false,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.005, 0.005),
    });
  }
  // Layer 1: 中景（標準サイズ、一部が結晶型）
  for (let i = 0; i < 35; i++) {
    const isCrystal = Math.random() < 0.15;
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-30, GROUND_Y),
      size: rand(1.5, 3), layer: 1,
      speedX: rand(0.2, 0.7), speedY: rand(0.3, 0.8),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.012, 0.025), swaySpeed2: rand(0.005, 0.012),
      swayAmp1: rand(0.3, 0.8), swayAmp2: rand(0.8, 2.0),
      alpha: rand(0.2, 0.45), sparkle: Math.random() < 0.2,
      crystal: isCrystal,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.01, 0.01),
    });
  }
  // Layer 2: 手前（大きく、明るく、被写界深度ボケ風）
  for (let i = 0; i < 15; i++) {
    snowflakes.push({
      x: rand(0, CANVAS_W), y: rand(-50, GROUND_Y),
      size: rand(3, 6), layer: 2,
      speedX: rand(0.5, 1.2), speedY: rand(0.5, 1.0),
      sway1: rand(0, Math.PI * 2), sway2: rand(0, Math.PI * 2),
      swaySpeed1: rand(0.015, 0.03), swaySpeed2: rand(0.006, 0.015),
      swayAmp1: rand(0.5, 1.2), swayAmp2: rand(1.0, 3.0),
      alpha: rand(0.08, 0.18), sparkle: false,
      crystal: false,
      rotation: rand(0, Math.PI * 2), rotSpeed: rand(-0.015, 0.015),
    });
  }
}

function initMountains() {
  mountains = [];
  // 遠景の山脈（3層）
  for (let layer = 0; layer < 3; layer++) {
    const peaks = [];
    const numPeaks = 5 + layer * 2;
    for (let i = 0; i < numPeaks; i++) {
      peaks.push({
        x: (CANVAS_W / (numPeaks - 1)) * i,
        h: rand(40, 90) - layer * 15,
      });
    }
    mountains.push({ peaks, layer, offset: 0 });
  }
}

function initGroundMarks() {
  groundMarks = [];
  for (let i = 0; i < 25; i++) {
    groundMarks.push({
      x: rand(0, CANVAS_W),
      w: rand(3, 12),
      speed: rand(0.6, 1),
    });
  }
}

function initAuroraWaves() {
  auroraWaves = [];
  for (let i = 0; i < 4; i++) {
    auroraWaves.push({
      offset: rand(0, Math.PI * 2),
      amplitude: rand(15, 35),
      frequency: rand(0.005, 0.012),
      y: rand(30, 100),
      hue: rand(100, 280),
      speed: rand(0.005, 0.015),
    });
  }
}

function updateStage() {
  stageTimer++;
  // 舞台は30秒ごとに変化
  const cycle = Math.floor(stageTimer / 1800) % 3;
  if (cycle === 0) stageMode = 'clear';
  else if (cycle === 1) stageMode = 'aurora';
  else stageMode = 'blizzard';

  // 吹雪パーティクル管理
  if (stageMode === 'blizzard') {
    if (blizzardParticles.length < 80) {
      blizzardParticles.push({
        x: CANVAS_W + rand(0, 50),
        y: rand(0, GROUND_Y),
        size: rand(1, 3),
        speedX: rand(3, 8),
        speedY: rand(0.5, 2),
      });
    }
  }
  for (let i = blizzardParticles.length - 1; i >= 0; i--) {
    blizzardParticles[i].x -= blizzardParticles[i].speedX;
    blizzardParticles[i].y += blizzardParticles[i].speedY;
    if (blizzardParticles[i].x < -10 || blizzardParticles[i].y > GROUND_Y) {
      if (stageMode === 'blizzard') {
        blizzardParticles[i].x = CANVAS_W + rand(0, 50);
        blizzardParticles[i].y = rand(0, GROUND_Y * 0.5);
      } else {
        blizzardParticles.splice(i, 1);
      }
    }
  }
}

function updateBackground() {
  // 風のうねり（ゆっくり変化）
  if (Math.random() < 0.005) windTarget = rand(-1.5, 1.5);
  windCurrent += (windTarget - windCurrent) * 0.01;
  windOffset = windCurrent;

  // 雪の更新（3層）
  for (const s of snowflakes) {
    // 層ごとのスクロール速度
    const layerScrollMul = [0.3, 0.7, 1.2][s.layer];
    s.x -= s.speedX * (gameSpeed / BASE_SPEED) * layerScrollMul;

    // 自然な落下
    s.y += s.speedY;

    // 二重sin波による有機的な揺らぎ
    s.sway1 += s.swaySpeed1;
    s.sway2 += s.swaySpeed2;
    const sway = Math.sin(s.sway1) * s.swayAmp1 + Math.sin(s.sway2) * s.swayAmp2;
    s.x += sway * 0.15;

    // 全体の風の影響（手前ほど強い）
    s.x += windOffset * (0.3 + s.layer * 0.4);

    // 回転
    s.rotation += s.rotSpeed;

    // リサイクル
    if (s.y > GROUND_Y + 5) {
      s.y = rand(-30, -5);
      s.x = rand(-20, CANVAS_W + 20);
    }
    if (s.x < -30) s.x = CANVAS_W + rand(5, 30);
    if (s.x > CANVAS_W + 30) s.x = rand(-30, -5);
  }
  // 山のパララックス
  for (const m of mountains) {
    m.offset -= gameSpeed * (0.1 + m.layer * 0.1);
  }
  // 地面マーク
  for (const g of groundMarks) {
    g.x -= g.speed * gameSpeed;
    if (g.x < -15) g.x = CANVAS_W + rand(0, 30);
  }
  // 舞台演出
  updateStage();
}

function drawSky() {
  // 南極の空（グラデーション）
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  if (stageMode === 'aurora') {
    grad.addColorStop(0, '#0a0a20');
    grad.addColorStop(0.4, '#0d1535');
    grad.addColorStop(1, '#1a2a4a');
  } else if (stageMode === 'blizzard') {
    grad.addColorStop(0, '#2a3a55');
    grad.addColorStop(0.5, '#3a4a65');
    grad.addColorStop(1, '#4a5a75');
  } else {
    grad.addColorStop(0, '#0b1a3b');
    grad.addColorStop(0.5, '#132850');
    grad.addColorStop(1, '#1e3a5f');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);
}

function drawAurora() {
  if (stageMode !== 'aurora') return;
  for (const wave of auroraWaves) {
    wave.offset += wave.speed;
    ctx.beginPath();
    ctx.moveTo(0, wave.y);
    for (let x = 0; x <= CANVAS_W; x += 4) {
      const y = wave.y + Math.sin(x * wave.frequency + wave.offset + frameCount * 0.01) * wave.amplitude;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(CANVAS_W, wave.y + 40);
    ctx.lineTo(0, wave.y + 40);
    ctx.closePath();
    const hue = (wave.hue + frameCount * 0.2) % 360;
    ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.08)`;
    ctx.fill();
  }
}

function drawMountains() {
  for (let mi = mountains.length - 1; mi >= 0; mi--) {
    const m = mountains[mi];
    const brightness = 25 + m.layer * 12;
    ctx.fillStyle = `rgb(${brightness + 30}, ${brightness + 40}, ${brightness + 55})`;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    for (const p of m.peaks) {
      const px = ((p.x + m.offset) % (CANVAS_W + 100)) - 50;
      ctx.lineTo(px, GROUND_Y - p.h);
    }
    ctx.lineTo(CANVAS_W, GROUND_Y);
    ctx.closePath();
    ctx.fill();
    // 山頂の雪
    ctx.fillStyle = `rgba(220, 235, 250, ${0.15 + m.layer * 0.08})`;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    for (const p of m.peaks) {
      const px = ((p.x + m.offset) % (CANVAS_W + 100)) - 50;
      ctx.lineTo(px, GROUND_Y - p.h);
    }
    ctx.lineTo(CANVAS_W, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }
}

function drawGround() {
  // 雪原
  const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
  groundGrad.addColorStop(0, '#d6eaf8');
  groundGrad.addColorStop(0.3, '#c4ddf0');
  groundGrad.addColorStop(1, '#a8c8e0');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  // 雪面のキラキラ
  for (const g of groundMarks) {
    const alpha = 0.2 + Math.sin(frameCount * 0.03 + g.x) * 0.15;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(g.x, GROUND_Y + 4, g.w, 2);
  }

  // 地面ライン
  ctx.strokeStyle = '#b8d8f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CANVAS_W, GROUND_Y);
  ctx.stroke();
}

function drawSnowCrystal(x, y, size, rotation, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.strokeStyle = `rgba(210, 235, 255, ${alpha})`;
  ctx.lineWidth = 0.8;
  // 六角形の結晶
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i;
    const ex = Math.cos(angle) * size;
    const ey = Math.sin(angle) * size;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    // 枝の先に小さなV
    if (size > 2.5) {
      const bLen = size * 0.35;
      const bAngle1 = angle + 0.5;
      const bAngle2 = angle - 0.5;
      const bx = ex * 0.65;
      const by = ey * 0.65;
      ctx.beginPath();
      ctx.moveTo(bx + Math.cos(bAngle1) * bLen, by + Math.sin(bAngle1) * bLen);
      ctx.lineTo(bx, by);
      ctx.lineTo(bx + Math.cos(bAngle2) * bLen, by + Math.sin(bAngle2) * bLen);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawSnowflakes() {
  // Layer 0 から描画（奥から手前へ）
  for (let layer = 0; layer <= 2; layer++) {
    for (const s of snowflakes) {
      if (s.layer !== layer) continue;

      // アルファの揺らぎ（キラキラ感）
      let alpha = s.alpha + Math.sin(frameCount * 0.02 + s.sway1 * 10) * 0.08;

      // スパークル（一瞬明るく光る）
      if (s.sparkle) {
        const sparkPhase = Math.sin(frameCount * 0.05 + s.sway2 * 20);
        if (sparkPhase > 0.92) {
          alpha = Math.min(0.9, alpha + 0.5);
          // 光芒
          ctx.strokeStyle = `rgba(255, 255, 240, ${alpha * 0.4})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(s.x - s.size * 2, s.y);
          ctx.lineTo(s.x + s.size * 2, s.y);
          ctx.moveTo(s.x, s.y - s.size * 2);
          ctx.lineTo(s.x, s.y + s.size * 2);
          ctx.stroke();
        }
      }

      if (s.crystal) {
        // 結晶型
        drawSnowCrystal(s.x, s.y, s.size * 1.8, s.rotation, alpha);
      } else if (layer === 2) {
        // 手前レイヤー：大きくソフトなボケ
        const gradient = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
        gradient.addColorStop(0, `rgba(220, 240, 255, ${alpha})`);
        gradient.addColorStop(0.5, `rgba(220, 240, 255, ${alpha * 0.4})`);
        gradient.addColorStop(1, `rgba(220, 240, 255, 0)`);
        ctx.fillStyle = gradient;
        ctx.fillRect(s.x - s.size, s.y - s.size, s.size * 2, s.size * 2);
      } else {
        // 通常の丸い雪
        ctx.fillStyle = `rgba(225, 238, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawBlizzard() {
  if (blizzardParticles.length === 0) return;
  ctx.fillStyle = 'rgba(220, 235, 255, 0.15)';
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);
  for (const p of blizzardParticles) {
    ctx.fillStyle = `rgba(240, 248, 255, ${rand(0.4, 0.9)})`;
    ctx.fillRect(p.x, p.y, p.size, p.size * 0.5);
  }
}

function drawBackground() {
  drawSky();
  drawAurora();
  drawMountains();
  drawGround();
  drawSnowflakes();
  drawBlizzard();

  // 加速中は雪がキラキラ
  if (accelTimer > 0) {
    ctx.fillStyle = `rgba(200, 230, 255, 0.04)`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

// ============================================================
// UI描画
// ============================================================
function drawUI() {
  // 半透明の背景バー
  ctx.fillStyle = 'rgba(10, 20, 40, 0.5)';
  ctx.fillRect(0, 0, CANVAS_W, 68);

  ctx.fillStyle = '#e0f0ff';
  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${Math.floor(score)}`, CANVAS_W - 20, 28);
  ctx.fillStyle = '#8ab8d8';
  ctx.fillText(`HI: ${Math.floor(highScore)}`, CANVAS_W - 20, 50);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e0f0ff';
  ctx.fillText(`SPEED: ${gameSpeed.toFixed(1)}`, 20, 28);

  // 舞台表示
  const stageLabel = stageMode === 'aurora' ? 'AURORA' : stageMode === 'blizzard' ? 'BLIZZARD' : 'CLEAR';
  ctx.fillStyle = stageMode === 'aurora' ? '#80ffb0' : stageMode === 'blizzard' ? '#a0c0e0' : '#7ab8d8';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText(stageLabel, 20, 50);

  if (accelTimer > 0) {
    ctx.fillStyle = '#f39c12';
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`BOOST x${scoreMultiplier}`, 120, 50);

    const gaugeW = 70;
    const gaugeH = 4;
    const ratio = accelTimer / ACCEL_DURATION;
    ctx.fillStyle = 'rgba(50,50,50,0.5)';
    ctx.fillRect(120, 56, gaugeW, gaugeH);
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(120, 56, gaugeW * ratio, gaugeH);
  }
}

function drawTitle() {
  // タイトル用背景（静止）
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0, '#0b1a3b');
  grad.addColorStop(0.5, '#132850');
  grad.addColorStop(0.7, '#1e3a5f');
  grad.addColorStop(0.85, '#d6eaf8');
  grad.addColorStop(1, '#a8c8e0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // タイトル画面のオーロラ
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    for (let x = 0; x <= CANVAS_W; x += 4) {
      const y = 60 + i * 20 + Math.sin(x * 0.008 + frameCount * 0.01 + i) * 25;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.lineTo(CANVAS_W, 120);
    ctx.lineTo(0, 120);
    ctx.closePath();
    const hue = (120 + i * 60 + frameCount * 0.3) % 360;
    ctx.fillStyle = `hsla(${hue}, 60%, 55%, 0.06)`;
    ctx.fill();
  }

  // ペンギン（タイトル画面中央）
  drawPenguin(CANVAS_W / 2 - 16, 185, 32, 38);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 46px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SHINSOKU', CANVAS_W / 2, 148);

  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillStyle = '#8ab8d8';
  ctx.fillText('- 南極ペンギンランナー -', CANVAS_W / 2, 175);

  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillStyle = '#c0ddf0';
  ctx.fillText('スペースキー or タップ でスタート', CANVAS_W / 2, 252);

  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.fillStyle = '#80b8d8';
  ctx.fillText('二段ジャンプ可能！  空中でもう一度押せる', CANVAS_W / 2, 285);
  ctx.fillStyle = '#7ec8e3';
  ctx.fillText('氷の障害物をジャンプで避けよう', CANVAS_W / 2, 308);
  ctx.fillStyle = '#f39c12';
  ctx.fillText('魚を取るとスピードUP！', CANVAS_W / 2, 331);

  if (highScore > 0) {
    ctx.fillStyle = '#c0ddf0';
    ctx.fillText(`ハイスコア: ${Math.floor(highScore)}`, CANVAS_W / 2, 370);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(5, 15, 35, 0.7)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = '#7ec8e3';
  ctx.font = 'bold 40px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CANVAS_W / 2, 145);

  // やられペンギン
  ctx.save();
  ctx.translate(CANVAS_W / 2, 195);
  ctx.rotate(0.3);
  drawPenguin(-16, -19, 32, 38);
  ctx.restore();

  ctx.fillStyle = '#e0f0ff';
  ctx.font = '22px "Segoe UI", sans-serif';
  ctx.fillText(`SCORE: ${Math.floor(score)}`, CANVAS_W / 2, 250);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#f39c12';
    ctx.font = '18px "Segoe UI", sans-serif';
    ctx.fillText('NEW RECORD!', CANVAS_W / 2, 282);
  }

  ctx.fillStyle = '#8ab8d8';
  ctx.font = '15px "Segoe UI", sans-serif';
  ctx.fillText('スペースキー or タップ でリトライ', CANVAS_W / 2, 325);
}

// ============================================================
// ゲーム制御
// ============================================================
function resetGame() {
  player.y = GROUND_Y - PLAYER_H;
  player.vy = 0;
  player.onGround = true;
  player.jumpCount = 0;
  player.runFrame = 0;
  obstacles = [];
  accelerators = [];
  gameSpeed = BASE_SPEED;
  accelTimer = 0;
  scoreMultiplier = 1;
  score = 0;
  frameCount = 0;
  safeZoneTimer = 0;
  stageTimer = 0;
  stageMode = 'clear';
  blizzardParticles = [];
  windOffset = 0; windTarget = 0; windCurrent = 0;
  spawnTimer = randInt(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_MAX);
  initSnowflakes();
  initMountains();
  initGroundMarks();
  initAuroraWaves();
}

function update() {
  if (state !== 'playing') return;

  frameCount++;
  playerUpdate();
  updateObjects();
  updateBackground();

  if (gameSpeed < MAX_SPEED) gameSpeed += SPEED_INCREMENT;

  if (accelTimer > 0) {
    accelTimer--;
    if (accelTimer <= 0) {
      gameSpeed = Math.max(BASE_SPEED, gameSpeed - ACCEL_BOOST);
      scoreMultiplier = 1;
    }
  }

  if (safeZoneTimer > 0) safeZoneTimer--;

  spawnTimer--;
  if (spawnTimer <= 0) {
    if (safeZoneTimer > 0) {
      if (Math.random() < 0.4) spawnAccelerator();
    } else {
      spawnObject();
    }
    const reactionGap = MIN_REACTION_FRAMES + Math.floor(gameSpeed * 1.5);
    const maxInterval = reactionGap + randInt(20, 50);
    spawnTimer = randInt(reactionGap, maxInterval);
  }

  const result = checkCollisions();
  if (result === 'hit') {
    state = 'gameover';
    if (score > highScore) highScore = score;
    return;
  }
  if (result === 'accel') {
    gameSpeed = Math.min(MAX_SPEED, gameSpeed + ACCEL_BOOST);
    accelTimer = ACCEL_DURATION;
    scoreMultiplier = SCORE_MULTIPLIER_BOOST;
    safeZoneTimer = 90;
  }

  score += 0.1 * (gameSpeed / BASE_SPEED) * scoreMultiplier;
}

function draw() {
  if (state === 'title') { drawTitle(); return; }
  drawBackground();
  drawObstacles();
  drawAccelerators();
  playerDraw();
  drawUI();
  if (state === 'gameover') drawGameOver();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// 入力
// ============================================================
function handleAction() {
  if (state === 'title') { resetGame(); state = 'playing'; }
  else if (state === 'playing') { playerJump(); }
  else if (state === 'gameover') { state = 'title'; }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleAction(); }
});
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, { passive: false });
canvas.addEventListener('mousedown', () => { handleAction(); });

// ============================================================
// 起動
// ============================================================
initSnowflakes();
initMountains();
initGroundMarks();
initAuroraWaves();
gameLoop();
</script>
</body>
</html>
